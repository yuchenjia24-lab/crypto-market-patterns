<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="BTC 与 ETH 全天 15 分钟市场时段模式、行情日分组及异常波动事件。">
  <title>加密市场时段模式</title>
</head>
<body>
<div id="crypto-market-patterns" class="cmp-root">
  <header class="hero">
    <div>
      <p class="eyebrow">CRYPTO MARKET MICROSTRUCTURE</p>
      <h1>加密市场时段模式</h1>
      <p class="hero-copy">BTC 与 ETH 的全天 15 分钟收益、方向概率和异常行情事件。</p>
    </div>
    <div class="live-badge"><i></i> 每日更新</div>
  </header>
  <div class="viz-controls" aria-label="统计筛选">
    <div class="viz-row" role="group" aria-label="回看窗口">
      <button type="button" class="btn" data-window="1m" aria-pressed="false">1个月</button>
      <button type="button" class="btn" data-window="3m" aria-pressed="false">3个月</button>
      <button type="button" class="btn btn-primary" data-window="6m" aria-pressed="true">6个月</button>
    </div>
    <div class="viz-row" role="group" aria-label="币种">
      <button type="button" class="btn btn-primary" data-asset="BTC" aria-pressed="true">BTC</button>
      <button type="button" class="btn" data-asset="ETH" aria-pressed="false">ETH</button>
    </div>
    <label class="form-label" for="cmp-metric">图表指标
      <select id="cmp-metric" class="form-select">
        <option value="r">15分钟平均收益</option>
        <option value="u">15分钟上涨比例</option>
        <option value="c">从00:00起累计收益</option>
      </select>
    </label>
  </div>

  <div class="cmp-meta text-small">
    <span id="cmp-sample"></span>
    <span>荷兰当地时间，已校正冬夏令时</span>
    <span>日型按BTC当日总收益：≥+1%多头，≤−1%空头</span>
  </div>

  <div class="viz-legend text-small" aria-label="行情分组">
    <span><i class="dot bull"></i><b id="legend-bull">多头日</b></span>
    <span><i class="dot stable"></i><b id="legend-stable">稳定日</b></span>
    <span><i class="dot bear"></i><b id="legend-bear">空头日</b></span>
  </div>

  <svg id="cmp-chart" role="img" aria-labelledby="cmp-chart-label" viewBox="0 0 760 350" preserveAspectRatio="xMidYMid meet"></svg>
  <span id="cmp-chart-label" class="sr-only">BTC和ETH按多头、稳定、空头日分组的全天十五分钟平均走势</span>
  <div id="cmp-detail" class="detail text-small text-muted" aria-live="polite">移动到图上查看具体时段。</div>

  <div class="table-bar">
    <span>30分钟平均收益与上涨比例</span>
    <label class="form-label" for="cmp-table-period">表格时段
      <select id="cmp-table-period" class="form-select">
        <option value="0">00–06</option>
        <option value="1">06–12</option>
        <option value="2">12–18</option>
        <option value="3" selected>18–24</option>
      </select>
    </label>
  </div>
  <table class="cmp-table">
    <thead><tr><th scope="col">时段</th><th scope="col">多头日</th><th scope="col">稳定日</th><th scope="col">空头日</th></tr></thead>
    <tbody id="cmp-tbody"></tbody>
  </table>

  <div class="events-head">
    <span>六个月异常行情与同期消息</span>
    <span class="text-small text-muted">|BTC 15分钟收益|约≥1.75%，相邻波动已合并</span>
  </div>
  <div class="event-note text-small">“高”表示时间与报道较吻合；“中”表示多因素并存；“低”只记录同期叙事，不宣称因果。</div>
  <ul id="cmp-events" class="event-list"></ul>
</div>

<style>
* { box-sizing: border-box; }
:root {
  color-scheme: dark;
  --bg: #07111f;
  --surface: #0d1a2b;
  --surface-2: #122238;
  --foreground: #e8f0fb;
  --muted-foreground: #8fa2ba;
  --border: #21334a;
  --accent: #5eead4;
  --accent-2: #22d3ee;
  --viz-series-1: #2dd4bf;
  --viz-series-2: #fbbf24;
  --viz-series-3: #fb7185;
}
html { background: var(--bg); }
body {
  margin: 0;
  min-height: 100vh;
  background:
    radial-gradient(circle at 12% -8%, rgba(34,211,238,.14), transparent 32rem),
    radial-gradient(circle at 92% 8%, rgba(45,212,191,.08), transparent 28rem),
    var(--bg);
  color: var(--foreground);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  -webkit-font-smoothing: antialiased;
}
button, select { font: inherit; }
a { color: var(--accent-2); text-decoration: none; }
a:hover { text-decoration: underline; }
#crypto-market-patterns { width: min(1180px, calc(100% - 40px)); margin: 0 auto; padding: 42px 0 64px; }
#crypto-market-patterns .hero { display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; margin-bottom: 28px; }
#crypto-market-patterns .eyebrow { margin: 0 0 9px; color: var(--accent); font-size: 11px; font-weight: 800; letter-spacing: .16em; }
#crypto-market-patterns h1 { margin: 0; font-size: clamp(32px, 5vw, 54px); line-height: 1.04; letter-spacing: -.045em; }
#crypto-market-patterns .hero-copy { max-width: 700px; margin: 12px 0 0; color: var(--muted-foreground); font-size: 16px; }
#crypto-market-patterns .live-badge { flex: 0 0 auto; display: inline-flex; align-items: center; gap: 8px; padding: 9px 13px; border: 1px solid rgba(94,234,212,.25); border-radius: 999px; background: rgba(45,212,191,.08); color: #b9fff5; font-size: 13px; }
#crypto-market-patterns .live-badge i { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 0 5px rgba(94,234,212,.09); }
#crypto-market-patterns .viz-controls { display: flex; flex-wrap: wrap; align-items: end; gap: 14px; padding: 16px; border: 1px solid var(--border); border-radius: 16px; background: rgba(13,26,43,.88); box-shadow: 0 20px 60px rgba(0,0,0,.18); }
#crypto-market-patterns .viz-row { display: inline-flex; gap: 5px; padding: 4px; border: 1px solid var(--border); border-radius: 11px; background: #091523; }
#crypto-market-patterns .btn { min-width: 58px; padding: 8px 12px; border: 0; border-radius: 8px; background: transparent; color: var(--muted-foreground); cursor: pointer; transition: .18s ease; }
#crypto-market-patterns .btn:hover { color: var(--foreground); background: rgba(255,255,255,.04); }
#crypto-market-patterns .btn-primary { background: linear-gradient(135deg, #1bb9aa, #0891b2); color: #03131a; font-weight: 800; box-shadow: 0 5px 18px rgba(34,211,238,.18); }
#crypto-market-patterns .form-label { display: grid; gap: 6px; margin-left: auto; color: var(--muted-foreground); font-size: 12px; }
#crypto-market-patterns .form-select { min-width: 190px; padding: 9px 34px 9px 11px; border: 1px solid var(--border); border-radius: 9px; background: #091523; color: var(--foreground); outline: none; }
#crypto-market-patterns .form-select:focus { border-color: var(--accent-2); box-shadow: 0 0 0 3px rgba(34,211,238,.12); }
#crypto-market-patterns .cmp-meta,
#crypto-market-patterns .viz-legend {
  display: flex; flex-wrap: wrap; gap: 8px 18px;
}
#crypto-market-patterns .cmp-meta { margin: 14px 2px 20px; color: var(--muted-foreground); font-size: 12px; }
#crypto-market-patterns .viz-legend { width: fit-content; margin: 0 0 -45px 70px; position: relative; z-index: 2; padding: 9px 11px; border: 1px solid var(--border); border-radius: 10px; background: rgba(7,17,31,.82); backdrop-filter: blur(8px); }
#crypto-market-patterns .viz-legend span { display: inline-flex; align-items: center; gap: 6px; }
#crypto-market-patterns .viz-legend b { font-size: 12px; font-weight: 600; }
#crypto-market-patterns .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; box-shadow: 0 0 12px currentColor; }
#crypto-market-patterns .dot.bull { background: var(--viz-series-1); }
#crypto-market-patterns .dot.stable { background: var(--viz-series-2); }
#crypto-market-patterns .dot.bear { background: var(--viz-series-3); }
#crypto-market-patterns svg { display: block; width: 100%; height: auto; color: var(--foreground); border: 1px solid var(--border); border-radius: 18px; background: linear-gradient(180deg, rgba(18,34,56,.88), rgba(9,21,35,.92)); box-shadow: 0 20px 60px rgba(0,0,0,.20); }
#crypto-market-patterns .grid { stroke: var(--border); stroke-width: 1; }
#crypto-market-patterns .zero { stroke: var(--muted-foreground); stroke-width: 1.4; }
#crypto-market-patterns .axis { fill: var(--muted-foreground); font-size: 11px; }
#crypto-market-patterns .line { fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; filter: drop-shadow(0 0 4px rgba(255,255,255,.10)); }
#crypto-market-patterns .guide { stroke: var(--muted-foreground); stroke-width: 1; opacity: 0; }
#crypto-market-patterns .target { fill: transparent; cursor: crosshair; }
#crypto-market-patterns .detail { min-height: 24px; margin: 8px 4px 22px; color: var(--muted-foreground); font-size: 12px; }
#crypto-market-patterns .table-bar,
#crypto-market-patterns .events-head {
  display: flex; justify-content: space-between; align-items: center; gap: 10px;
  margin: 26px 0 10px; font-size: 18px; font-weight: 750;
}
#crypto-market-patterns .table-bar .form-label { display: flex; align-items: center; gap: 9px; margin-left: 0; font-weight: 400; }
#crypto-market-patterns .table-bar .form-select { min-width: 110px; }
#crypto-market-patterns .cmp-table { width: 100%; overflow: hidden; border-collapse: separate; border-spacing: 0; table-layout: fixed; border: 1px solid var(--border); border-radius: 14px; background: rgba(13,26,43,.72); }
#crypto-market-patterns .cmp-table th,
#crypto-market-patterns .cmp-table td {
  border-bottom: 1px solid var(--border); padding: 11px 14px; text-align: right; vertical-align: top; font-variant-numeric: tabular-nums;
}
#crypto-market-patterns .cmp-table thead th { background: #122238; color: var(--muted-foreground); font-size: 11px; letter-spacing: .06em; text-transform: uppercase; }
#crypto-market-patterns .cmp-table tbody tr:last-child th,
#crypto-market-patterns .cmp-table tbody tr:last-child td { border-bottom: 0; }
#crypto-market-patterns .cmp-table tbody tr:hover { background: rgba(34,211,238,.035); }
#crypto-market-patterns .cmp-table th:first-child,
#crypto-market-patterns .cmp-table td:first-child { width: 20%; text-align: left; }
#crypto-market-patterns .cmp-table td span,
#crypto-market-patterns .cmp-table td small { display: block; }
#crypto-market-patterns .cmp-table td small { color: var(--muted-foreground); margin-top: 3px; }
#crypto-market-patterns .events-head .text-muted { font-size: 12px; font-weight: 400; }
#crypto-market-patterns .event-note { color: var(--muted-foreground); margin-bottom: 10px; font-size: 12px; }
#crypto-market-patterns .event-list { list-style: none; padding: 0 16px; margin: 0; border: 1px solid var(--border); border-radius: 14px; background: rgba(13,26,43,.72); }
#crypto-market-patterns .event-list li {
  display: grid; grid-template-columns: 132px 115px 1fr auto; gap: 8px;
  align-items: center; padding: 13px 0; border-bottom: 1px solid var(--border);
}
#crypto-market-patterns .event-list li:last-child { border-bottom: 0; }
#crypto-market-patterns .event-time,
#crypto-market-patterns .event-move { color: var(--muted-foreground); font-size: 12px; font-variant-numeric: tabular-nums; }
#crypto-market-patterns .event-move { color: var(--foreground); font-weight: 750; }
#crypto-market-patterns .event-title { line-height: 1.45; }
#crypto-market-patterns .event-source { padding: 5px 8px; border: 1px solid var(--border); border-radius: 7px; white-space: nowrap; font-size: 11px; }
#crypto-market-patterns .confidence { color: var(--muted-foreground); }
#crypto-market-patterns .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
@media (max-width: 560px) {
  #crypto-market-patterns { width: min(100% - 22px, 1180px); padding-top: 26px; }
  #crypto-market-patterns .hero { align-items: flex-start; flex-direction: column; }
  #crypto-market-patterns .hero-copy { font-size: 14px; }
  #crypto-market-patterns .viz-controls { align-items: stretch; padding: 12px; }
  #crypto-market-patterns .viz-row { flex: 1; }
  #crypto-market-patterns .btn { flex: 1; min-width: 0; }
  #crypto-market-patterns .form-label { width: 100%; margin-left: 0; }
  #crypto-market-patterns .form-select { width: 100%; min-width: 0; }
  #crypto-market-patterns .cmp-meta { display: grid; }
  #crypto-market-patterns .viz-legend { margin: 0 0 -39px 48px; gap: 8px; }
  #crypto-market-patterns .viz-legend b { font-size: 10px; }
  #crypto-market-patterns .table-bar { align-items: flex-start; flex-direction: column; }
  #crypto-market-patterns .table-bar .form-label { width: auto; }
  #crypto-market-patterns .event-list li { grid-template-columns: 1fr auto; }
  #crypto-market-patterns .event-title { grid-column: 1 / -1; }
  #crypto-market-patterns .event-source { justify-self: end; }
  #crypto-market-patterns .cmp-table th,
  #crypto-market-patterns .cmp-table td { padding: 9px 6px; font-size: 12px; }
  #crypto-market-patterns .cmp-table th { padding: 9px 6px; font-size: 10px; }
  #crypto-market-patterns .cmp-table th:first-child,
  #crypto-market-patterns .cmp-table td:first-child { width: 28%; }
  #crypto-market-patterns .events-head { align-items: flex-start; flex-direction: column; }
}
</style>

  const regimes = ["bull", "stable", "bear"];
  const names = { bull: "多头日", stable: "稳定日", bear: "空头日" };
  const colors = { bull: "var(--viz-series-1)", stable: "var(--viz-series-2)", bear: "var(--viz-series-3)" };
  const metricNames = { r: "15分钟平均收益", u: "15分钟上涨比例", c: "累计收益" };
  let windowKey = "6m";
  let asset = "BTC";
  const svg = root.querySelector("#cmp-chart");
  const detail = root.querySelector("#cmp-detail");
  const metric = root.querySelector("#cmp-metric");
  const period = root.querySelector("#cmp-table-period");
  const tbody = root.querySelector("#cmp-tbody");

  function svgEl(name, attrs) {
    const node = document.createElementNS("http://www.w3.org/2000/svg", name);
    Object.entries(attrs || {}).forEach(function (pair) { node.setAttribute(pair[0], pair[1]); });
    return node;
  }
  function current(regime) { return stats[windowKey][asset][regime]; }
  function clock(slot) {
    const mins = slot * 15;
    return String(Math.floor(mins / 60)).padStart(2, "0") + ":" + String(mins % 60).padStart(2, "0");
  }
  function fmt(value, key) {
    if (key === "u") return Math.round(value * 100) + "%";
    return (value >= 0 ? "+" : "") + value.toFixed(2) + "%";
  }
  function updateMeta() {
    const total = regimes.reduce(function (sum, g) { return sum + current(g).n; }, 0);
    root.querySelector("#cmp-sample").textContent = "完整样本 " + total + " 天";
    regimes.forEach(function (g) {
      root.querySelector("#legend-" + g).textContent = names[g] + "（n=" + current(g).n + "）";
    });
  }
  function draw() {
    updateMeta();
    svg.replaceChildren();
    const key = metric.value;
    const W = 760, H = 350;
    const m = { top: 14, right: 18, bottom: 40, left: 58 };
    const iw = W - m.left - m.right, ih = H - m.top - m.bottom;
    const values = regimes.flatMap(function (g) { return current(g)[key]; });
    let lo = Math.min.apply(null, values), hi = Math.max.apply(null, values);
    if (key === "u") { lo = 0; hi = 1; }
    else {
      const pad = Math.max((hi - lo) * 0.12, 0.025);
      lo = Math.min(0, lo - pad); hi = Math.max(0, hi + pad);
    }
    const x = function (i) { return m.left + i / 95 * iw; };
    const y = function (v) { return m.top + (hi - v) / (hi - lo || 1) * ih; };
    for (let j = 0; j <= 4; j += 1) {
      const v = lo + (hi - lo) * j / 4, yy = y(v);
      svg.appendChild(svgEl("line", { x1: m.left, y1: yy, x2: W - m.right, y2: yy, class: Math.abs(v) < 0.00001 ? "zero" : "grid" }));
      const label = svgEl("text", { x: m.left - 9, y: yy + 4, "text-anchor": "end", class: "axis" });
      label.textContent = fmt(v, key); svg.appendChild(label);
    }
    for (let i = 0; i < 96; i += 16) {
      const label = svgEl("text", { x: x(i), y: H - 14, "text-anchor": "middle", class: "axis" });
      label.textContent = clock(i); svg.appendChild(label);
    }
    regimes.forEach(function (g) {
      const arr = current(g)[key];
      const d = arr.map(function (v, i) { return (i ? "L" : "M") + x(i).toFixed(1) + "," + y(v).toFixed(1); }).join(" ");
      svg.appendChild(svgEl("path", { d: d, class: "line", stroke: colors[g] }));
    });
    const guide = svgEl("line", { x1: 0, y1: m.top, x2: 0, y2: H - m.bottom, class: "guide" });
    svg.appendChild(guide);
    const target = svgEl("rect", { x: m.left, y: m.top, width: iw, height: ih, class: "target" });
    target.addEventListener("mousemove", function (event) {
      const rect = svg.getBoundingClientRect();
      const px = (event.clientX - rect.left) * W / rect.width;
      const idx = Math.max(0, Math.min(95, Math.round((px - m.left) / iw * 95)));
      guide.setAttribute("x1", x(idx)); guide.setAttribute("x2", x(idx)); guide.style.opacity = "1";
      const text = regimes.map(function (g) { return names[g] + " " + fmt(current(g)[key][idx], key); }).join("；");
      detail.textContent = asset + " · " + clock(idx) + " · " + metricNames[key] + "： " + text;
    });
    target.addEventListener("mouseleave", function () { guide.style.opacity = "0"; });
    svg.appendChild(target);
  }
  function renderTable() {
    tbody.replaceChildren();
    const section = Number(period.value);
    const start = section * 12;
    for (let i = start; i < start + 12; i += 1) {
      const tr = document.createElement("tr");
      const th = document.createElement("th"); th.scope = "row";
      const startSlot = i * 2; th.textContent = clock(startSlot) + "–" + clock((startSlot + 2) % 96); tr.appendChild(th);

        val.textContent = fmt(d.r30[i], "r"); up.textContent = "上涨 " + Math.round(d.u30[i] * 100) + "%";
        td.append(val, up); tr.appendChild(td);
      });
      tbody.appendChild(tr);
    }
  }
  function renderEvents() {
